<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Transport Company</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow-x: hidden;
        }
        
        .btn-massive {
            font-size: 1.5rem;
            padding: 1rem 3rem;
            border-radius: 50px;
            transition: transform 0.2s ease-in-out;
        }
        .btn-massive:hover {
            transform: scale(1.05);
        }

        /* Stil pentru player-ul video să arate bine pe fundalul albastru */
        .tutorial-video {
            max-width: 550px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            background-color: #000;
        }
    </style>
</head>
<body class="d-flex flex-column vh-100">

    <nav class="navbar navbar-dark sticky-top shadow-sm" style="background-color: #0285e9;">
        <div class="container-fluid d-flex justify-content-between align-items-center px-2"> 
            <a class="navbar-brand fw-bold d-flex align-items-center m-0" href="{{ url_for('guest.home') }}">
                <img src="{{ url_for('static', filename='img/truck.png') }}" alt="Logo" height="60" class="me-3">
                <span class="display-6 fw-bold">TCMS</span>
            </a>
            
            <ul class="navbar-nav d-flex flex-row align-items-center m-0" style="list-style: none;">
                <li class="nav-item me-5">
                    <a class="nav-link text-light fs-4 fw-bold px-0" href="{{ url_for('guest.about') }}" style="white-space: nowrap;">About Us</a>
                </li>
                <li class="nav-item me-3">
                    <a class="nav-link text-light fs-4 fw-bold px-0" href="{{ url_for('auth.login') }}">Login</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="row g-0 flex-grow-1">
        
        <div class="col-md-6 bg-white p-5 d-flex flex-column justify-content-center align-items-center text-center">
            <div>
                <h1 class="display-4 fw-bold" style="color: #0078d4;">Reliable Transport<br>Management</h1>
                <p class="lead mt-3 text-muted fs-4">Streamline your logistics, from booking to delivery.</p>
                <div class="mt-5">
                    <a href="{{ url_for('auth.register') }}" class="btn btn-warning btn-massive fw-bold shadow">Create an Account</a>
                </div>
            </div>
        </div>

        <div class="col-md-6 p-5 d-flex flex-column justify-content-start align-items-center" style="background-color: #0078d4; overflow-y: auto;">
            
            <div class="bg-light p-4 rounded shadow text-center w-100 mt-2" style="max-width: 550px; border-top: 6px solid #ffc107;">
                <h3 class="fw-bold text-dark mb-2">New to our platform?</h3>
                <p class="text-muted mb-0 fs-5">Watch our quick tutorial to see how easy it is to manage your transport requests.</p>
            </div>

            <video class="w-100 rounded shadow-lg mt-5 tutorial-video" controls>
                <source src="{{ url_for('static', filename='videos/tutorial.mp4') }}" type="video/mp4">
                Your browser does not support the video tag.
            </video>

        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
